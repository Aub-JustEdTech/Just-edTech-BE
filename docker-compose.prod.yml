# Production Docker Compose - Optimized for High-Performance Bulk Uploads
#
# Postgres is NOT managed here; it runs on AWS RDS.
# All environment variables (including POSTGRES_SERVER, credentials, secrets)
# are injected via .env.prod which the CI/CD deploy step writes from GitHub
# Actions secrets before running this file.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml up -d --scale celery-worker=8  # 8 workers

services:
  # Redis for Session Management and Celery Broker
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6386:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:v1.13.2
    restart: always
    ports:
      - "6343:6333"  # HTTP API
      - "6344:6334"  # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 768M
        reservations:
          cpus: "0.3"
          memory: 384M
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # FastAPI Application
  api:
    container_name: just-edtech
    build: .
    restart: always
    ports:
      - "8013:8000"
    env_file:
      - .env.prod
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - temp_uploads:/app/temp_uploads
      - ./app:/app/app
      - ./seed_database.py:/app/seed_database.py
      - ./scripts:/app/scripts
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 2G
    command: >
      sh -c "
        alembic upgrade head &&
        gunicorn app.main:app --config gunicorn.conf.py
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery Workers for Document Processing (OPTIMIZED)
  celery-worker:
    build: .
    restart: always
    env_file:
      - .env.prod
    deploy:
      replicas: 1 # Single worker for t4g.medium (2 vCPU, 4GB RAM)
      resources:
        limits:
          cpus: "1.0" # Max 1 CPU per worker
          memory: 1G # Max 1GB RAM per worker
        reservations:
          cpus: "0.5" # Reserve 0.5 CPU per worker
          memory: 512M # Reserve 512MB RAM per worker
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - temp_uploads:/app/temp_uploads
      - ./app:/app/app
    command: >
      celery -A app.celery_app worker
      --loglevel=info
      --concurrency=2
      --max-tasks-per-child=1000
      --time-limit=3600
      --soft-time-limit=3000
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Flower - Celery Monitoring Dashboard
  # REMOVED from production to save ~150-300MB RAM on t4g.medium
  # To run Flower on-demand: docker compose -f docker-compose.yml up flower

volumes:
  redis_data:
  qdrant_data:
  temp_uploads:
