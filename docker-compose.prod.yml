# Production Docker Compose - Optimized for High-Performance Bulk Uploads
#
# Postgres is NOT managed here; it runs on AWS RDS.
# All environment variables (including POSTGRES_SERVER, credentials, secrets)
# are injected via .env.prod which the CI/CD deploy step writes from GitHub
# Actions secrets before running this file.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml up -d --scale celery-worker=8  # 8 workers


version: "3.9"

services:

  ##################################################
  # Redis
  ##################################################
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped

    ports:
      - "6386:6379"

    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ##################################################
  # Qdrant
  ##################################################
  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: qdrant
    restart: unless-stopped

    ports:
      - "6343:6333"
      - "6344:6334"

    volumes:
      - qdrant_data:/qdrant/storage

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10

  ##################################################
  # FastAPI
  ##################################################
  api:
    image: ${ECR_IMAGE}
    container_name: just-edtech-api

    restart: unless-stopped

    env_file:
      - .env.prod

    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QDRANT_URL: http://qdrant:6333

    ports:
      - "8013:8000"

    depends_on:
      redis:
        condition: service_healthy

      qdrant:
        condition: service_healthy

    volumes:
      - temp_uploads:/app/temp_uploads

    command: >
      sh -c "
      alembic upgrade head &&
      gunicorn app.main:app --config gunicorn.conf.py
      "

    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:8000/health"
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  ##################################################
  # Celery Worker
  ##################################################
  celery-worker:
    image: ${ECR_IMAGE}
    container_name: celery-worker

    restart: unless-stopped

    env_file:
      - .env.prod

    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QDRANT_URL: http://qdrant:6333

    depends_on:
      redis:
        condition: service_healthy

      qdrant:
        condition: service_healthy

    volumes:
      - temp_uploads:/app/temp_uploads

    command: >
      celery
      -A app.celery_app
      worker
      --loglevel=info
      --concurrency=2
      --max-tasks-per-child=1000
      --time-limit=3600
      --soft-time-limit=3000

volumes:
  redis_data:
  qdrant_data:
  temp_uploads:
