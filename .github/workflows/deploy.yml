name: Deploy Chats to S3

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to deploy'
        required: true
        default: 'main'
        type: string

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Build @justedtech/theme
        run: |
          cd packages/theme
          pnpm install
          pnpm build
          echo "✅ @justedtech/theme built successfully"

      - name: Create .env file for chats
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: |
          test -n "$VITE_API_BASE_URL" || (echo "❌ Missing variable: VITE_API_BASE_URL" && exit 1)

          cd apps/chats
          echo "VITE_API_BASE_URL=$VITE_API_BASE_URL" > .env
          echo "✅ Environment file created"

      - name: Build @chats application
        run: |
          cd apps/chats
          pnpm install
          pnpm build
          echo "✅ @chats built successfully"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy to S3
        env:
          S3_BUCKET: ${{ vars.CHATS_S3_BUCKET_NAME }}
        run: |
          aws s3 sync apps/chats/dist/ s3://$S3_BUCKET/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.json"

          # Upload HTML and JSON files without cache
          aws s3 sync apps/chats/dist/ s3://$S3_BUCKET/ \
            --exclude "*" \
            --include "*.html" \
            --include "*.json" \
            --cache-control "no-cache, no-store, must-revalidate"

          echo "✅ Files uploaded to S3"

      - name: Invalidate CloudFront cache
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CHATS_CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
            --paths "/*"

          echo "✅ CloudFront cache invalidated"

      - name: Deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch/Tag**: ${{ inputs.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- **AWS Region**: ${{ vars.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **S3 Bucket**: ${{ vars.CHATS_S3_BUCKET_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **CloudFront Distribution**: ${{ vars.CHATS_CLOUDFRONT_DISTRIBUTION_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed at**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Order" >> $GITHUB_STEP_SUMMARY
          echo "1. ✅ @justedtech/theme" >> $GITHUB_STEP_SUMMARY
          echo "2. ✅ @chats" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎉 **Deployment completed successfully!**" >> $GITHUB_STEP_SUMMARY
