name: Deploy Backend

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or Tag"
        required: true
        default: "main"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .

      - name: Push Docker Image
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ vars.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh ${{ vars.EC2_USER }}@${{ vars.EC2_HOST }} 'bash -s' <<EOF
          set -e

          cd ${{ vars.APP_DIRECTORY }}

          echo "Logging into ECR..."

          aws ecr get-login-password \
            --region ${{ vars.AWS_REGION }} \
          | docker login \
            --username AWS \
            --password-stdin \
            ${{ vars.ECR_REGISTRY }}

          git fetch origin
          git checkout ${{ github.event.inputs.ref }}
          git pull origin ${{ github.event.inputs.ref }}

          cat > .env.prod <<EOL
ECR_IMAGE=${{ vars.ECR_REGISTRY }}/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}

POSTGRES_SERVER=${{ secrets.POSTGRES_SERVER }}
POSTGRES_DB=${{ secrets.POSTGRES_DB }}
POSTGRES_USER=${{ secrets.POSTGRES_USER }}
POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}

JWT_SECRET=${{ secrets.JWT_SECRET }}

OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}

AWS_REGION=${{ vars.AWS_REGION }}

AWS_BUCKET=${{ secrets.AWS_BUCKET }}

REDIS_HOST=redis
REDIS_PORT=6379
EOL

          echo ""
          echo "Generated .env.prod"

          sed \
            -e "s/POSTGRES_PASSWORD=.*/POSTGRES_PASSWORD=********/" \
            -e "s/JWT_SECRET=.*/JWT_SECRET=********/" \
            -e "s/OPENAI_API_KEY=.*/OPENAI_API_KEY=********/" \
            .env.prod

          echo ""
          echo "Checking ECR_IMAGE..."

          grep ECR_IMAGE .env.prod

          docker compose \
            --env-file .env.prod \
            -f docker-compose.prod.yml pull

          docker compose \
            --env-file .env.prod \
            -f docker-compose.prod.yml down

          docker compose \
            --env-file .env.prod \
            -f docker-compose.prod.yml up -d

          echo "Waiting 30 seconds..."
          sleep 30

          docker compose \
            --env-file .env.prod \
            -f docker-compose.prod.yml ps

          API_ID=\$(docker compose \
            --env-file .env.prod \
            -f docker-compose.prod.yml ps -q api)

          STATUS=\$(docker inspect \
            --format="{{.State.Health.Status}}" \
            \$API_ID)

          echo "Health = \$STATUS"

          if [ "\$STATUS" != "healthy" ]; then
            echo "Deployment failed"

            docker compose \
              --env-file .env.prod \
              -f docker-compose.prod.yml logs --tail=300

            exit 1
          fi

          docker image prune -af
          docker system prune -f

          echo "Deployment Successful"

EOF

      - name: Verify Deployment
        run: |
          ssh ${{ vars.EC2_USER }}@${{ vars.EC2_HOST }} <<EOF
          cd ${{ vars.APP_DIRECTORY }}

          docker compose \
            --env-file .env.prod \
            -f docker-compose.prod.yml ps

          docker ps
EOF

      - name: Deployment Summary
        run: |
          echo "## Backend Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** ${{ vars.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "**EC2:** ${{ vars.EC2_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ✅ Success" >> $GITHUB_STEP_SUMMARY
